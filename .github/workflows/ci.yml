name: ci

on:
  push: { branches: [ main ] }
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew --no-daemon build modulithVerify
      - uses: actions/upload-artifact@v4
        with: { name: sopstore-jar, path: build/libs/*.jar }

  lint:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 25 }
      - run: ./gradlew --no-daemon checkstyleMain spotbugsMain

  sast:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with: { languages: java }
      - uses: github/codeql-action/analyze@v3

  deps-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 25 }
      - run: ./gradlew --no-daemon dependencyCheckAnalyze || true

  container-scan:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 25 }
      - run: ./gradlew --no-daemon bootJar -x test
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t sopstore:ci -f deploy/Dockerfile .
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: sopstore:ci
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
      - uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: trivy.sarif }

  integration-tests:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 25 }
      - run: ./gradlew --no-daemon integrationTest
