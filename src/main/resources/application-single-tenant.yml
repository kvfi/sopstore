sopstore:
  deployment-mode: single-tenant
  tenancy:
    isolation: dedicated-db
    multi-tenant: false
    fixed-tenant-id: ${TENANT_ID:00000000-0000-0000-0000-000000000001}

spring:
  jpa:
    properties:
      hibernate.multiTenancy: DISCRIMINATOR
      hibernate.tenant_identifier_resolver: com.rightcrowd.sopstore.tenancy.internal.HibernateTenantResolver
