apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sopstore.fullname" . }}
  labels: {{- include "sopstore.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "sopstore.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels: {{- include "sopstore.selectorLabels" . | nindent 8 }}
    spec:
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: sopstore
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "{{ .Values.deploymentMode }}"
            - name: DATABASE_URL
              value: "{{ .Values.database.url }}"
            - name: DATABASE_USER
              valueFrom: { secretKeyRef: { name: "{{ .Values.database.existingSecret }}", key: username } }
            - name: DATABASE_PASSWORD
              valueFrom: { secretKeyRef: { name: "{{ .Values.database.existingSecret }}", key: password } }
            - name: REDIS_HOST
              value: "{{ .Values.redis.host }}"
            - name: REDIS_PORT
              value: "{{ .Values.redis.port }}"
            - name: SESSION_SECRET
              valueFrom: { secretKeyRef: { name: {{ include "sopstore.fullname" . }}-session, key: secret } }
            - name: SOPSTORE_S3_ENDPOINT
              value: "{{ .Values.storage.endpoint }}"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ .Values.otel.endpoint }}"
            - name: BUILD_VERSION
              value: "{{ .Values.buildVersion }}"
          livenessProbe:
            httpGet: { path: {{ .Values.probes.liveness.path }}, port: http }
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet: { path: {{ .Values.probes.readiness.path }}, port: http }
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
