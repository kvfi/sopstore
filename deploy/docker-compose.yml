# Local development stack.
# For air-gapped production deployments see deploy/helm/sopstore and docs/OFFLINE.md.

services:
  db:
    image: postgres:16.4@sha256:e62fbf9d3e2b49816a32c400ed2dba83e3b361e6833e624024309c35d334b412
    container_name: sopstore-db
    environment:
      POSTGRES_USER: sopstore
      POSTGRES_PASSWORD: sopstore
      POSTGRES_DB: sopstore
      PG_COLOR: "never"
    volumes:
      - sopstore_pgdata:/var/lib/postgresql/data
      # Provisions the non-superuser `sopstore_app` runtime role on first DB init.
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sopstore"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Own database for the standalone script-service (ADR-0009). Separate container so the
  # service is independently deployable. Dev: run it with `./gradlew :script-service:bootRun`.
  script-db:
    image: postgres:16.4@sha256:e62fbf9d3e2b49816a32c400ed2dba83e3b361e6833e624024309c35d334b412
    container_name: sopstore-script-db
    environment:
      POSTGRES_USER: scriptstore
      POSTGRES_PASSWORD: scriptstore
      POSTGRES_DB: scriptstore
      PG_COLOR: "never"
    volumes:
      - sopstore_script_pgdata:/var/lib/postgresql/data
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scriptstore"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: sopstore-redis
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports: ["6379:6379"]
    volumes: [sopstore_redisdata:/data]
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    container_name: sopstore-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniominio
    ports: ["9000:9000", "9001:9001"]
    volumes: [sopstore_miniodata:/data]
    restart: unless-stopped

  # Optional on-prem IAM. Enable with `--profile iam`.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: sopstore-keycloak
    profiles: ["iam"]
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    ports: ["8081:8080"]

  app:
    image: sopstore:0.1.0
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: sopstore-app
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }
      minio: { condition: service_started }
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-saas}
      DATABASE_URL: jdbc:postgresql://db:5432/sopstore
      # Runtime connects as the non-superuser role so Postgres RLS is enforced...
      DATABASE_USER: sopstore_app
      DATABASE_PASSWORD: ${APP_DB_PASSWORD:-sopstore_app}
      # ...while migrations run as the owner (DDL + FORCE ROW LEVEL SECURITY).
      FLYWAY_URL: jdbc:postgresql://db:5432/sopstore
      FLYWAY_USER: sopstore
      FLYWAY_PASSWORD: sopstore
      REDIS_HOST: redis
      SOPSTORE_S3_ENDPOINT: http://minio:9000
      SOPSTORE_S3_ACCESS_KEY: minio
      SOPSTORE_S3_SECRET_KEY: miniominio
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    ports: ["8080:8080"]
    restart: unless-stopped

volumes:
  sopstore_pgdata:
  sopstore_script_pgdata:
  sopstore_redisdata:
  sopstore_miniodata:
